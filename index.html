<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kalkulator Nisa Imut ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* mengurangi teks terpilih saat tap cepat */
        }

        body {
            background: linear-gradient(145deg, #f9c9e8 0%, #f7a1c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, -apple-system, 'Comic Neue', cursive;
            margin: 0;
            padding: 20px;
        }

        /* Container utama dengan efek imut */
        .calculator-card {
            max-width: 380px;
            width: 100%;
            background: rgba(255, 245, 250, 0.95);
            border-radius: 70px 70px 80px 80px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 12px #ffe0f0, 0 0 0 16px #ffb7cf;
            backdrop-filter: blur(0px);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .calculator-card:hover {
            transform: scale(1.01);
        }

        /* Header lucu */
        .cute-header {
            background: #ffecf3;
            padding: 18px 20px 12px 20px;
            text-align: center;
            border-bottom: 3px dashed #ff90b5;
        }

        .cute-header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e84393, #fd79a8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px #ffe0f0;
            font-weight: 800;
        }

        .cute-header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #c4457a;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .heart-emoji {
            animation: beat 1.2s infinite ease;
            display: inline-block;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Layar kalkulator */
        .display-screen {
            background: #2d1f2b;
            margin: 20px 25px 15px 25px;
            border-radius: 48px;
            padding: 18px 20px;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3), 0 3px 0 #ab8a9a;
        }

        .expression {
            background: #fff6f0;
            border-radius: 36px;
            padding: 12px 18px;
            text-align: right;
            font-size: 1.2rem;
            color: #7a4e64;
            font-weight: 500;
            min-height: 54px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
        }

        .result {
            background: #fbe7f0;
            border-radius: 36px;
            padding: 12px 20px;
            text-align: right;
            font-size: 2.5rem;
            font-weight: bold;
            color: #c2185b;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
        }

        /* grid tombol imut */
        .buttons-panel {
            padding: 10px 20px 30px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background: #ffeef4;
            border: none;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 16px 0;
            border-radius: 60px;
            font-family: 'Poppins', 'Segoe UI', monospace;
            transition: all 0.15s ease;
            color: #b13e6b;
            cursor: pointer;
            box-shadow: 0 5px 0 #cfa5bd;
            text-shadow: 0 1px 0 white;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cfa5bd;
        }

        /* tombol spesial */
        .operator-btn {
            background: #ffd9e8;
            color: #c2185b;
            font-size: 2rem;
            font-weight: 800;
        }

        .equal-btn {
            background: #f9a8d4;
            color: white;
            text-shadow: 0 1px 2px #a13e63;
            box-shadow: 0 5px 0 #b25f84;
            font-size: 2rem;
        }

        .clear-btn {
            background: #ffc0d0;
            color: #b13e6b;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .delete-btn {
            background: #ffd0de;
            font-size: 1.4rem;
        }

        /* tombol angka */
        .num-btn {
            background: white;
            color: #e84393;
            font-weight: 700;
        }

        /* catatan kecil */
        .footer-note {
            text-align: center;
            padding: 10px 10px 18px;
            font-size: 0.7rem;
            color: #e06d9a;
            background: #fff2f7;
            border-top: 1px solid #ffcadd;
            font-weight: 500;
        }

        @media (max-width: 450px) {
            .buttons-panel {
                gap: 8px;
            }
            button {
                font-size: 1.4rem;
                padding: 12px 0;
            }
            .result {
                font-size: 2rem;
            }
            .expression {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="cute-header">
        <h1>🌸 Kalkulator Nisa Imut 🌸</h1>
        <p>💖 buat kamu yang tersayang 💖 <span class="heart-emoji">❤️</span></p>
    </div>

    <div class="display-screen">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
    </div>

    <div class="buttons-panel">
        <!-- Baris 1: Clear, Delete, %, / -->
        <button class="clear-btn" data-action="clear">C</button>
        <button class="delete-btn" data-action="delete">⌫</button>
        <button class="operator-btn" data-op="%">%</button>
        <button class="operator-btn" data-op="/">÷</button>

        <!-- Baris 2: 7 8 9 * -->
        <button class="num-btn" data-num="7">7</button>
        <button class="num-btn" data-num="8">8</button>
        <button class="num-btn" data-num="9">9</button>
        <button class="operator-btn" data-op="*">×</button>

        <!-- Baris 3: 4 5 6 - -->
        <button class="num-btn" data-num="4">4</button>
        <button class="num-btn" data-num="5">5</button>
        <button class="num-btn" data-num="6">6</button>
        <button class="operator-btn" data-op="-">−</button>

        <!-- Baris 4: 1 2 3 + -->
        <button class="num-btn" data-num="1">1</button>
        <button class="num-btn" data-num="2">2</button>
        <button class="num-btn" data-num="3">3</button>
        <button class="operator-btn" data-op="+">+</button>

        <!-- Baris 5: 0 , 00, ., = -->
        <button class="num-btn" data-num="0">0</button>
        <button class="num-btn" data-num="00">00</button>
        <button class="num-btn" data-dot=".">.</button>
        <button class="equal-btn" data-action="equals">=</button>
    </div>
    <div class="footer-note">
        ✨ sayang nisa, hitungan jadi lebih manis ✨
    </div>
</div>

<script>
    // ======================= KALKULATOR UNTUK NISA IMUT =======================
    // Fitur: ekspresi dinamis, eval aman (Function constructor), validasi error, 
    // tombol hapus, clear, persen, dan dukungan desimal + angka 00.
    
    // State utama
    let currentExpression = "";   // menyimpan ekspresi matematika yg akan ditampilkan & dievaluasi
    let lastResult = null;        // menyimpan hasil terakhir (opsional)
    let justEvaluated = false;    // flag setelah tekan '=', untuk mengganti ekspresi jika tekan angka / operator
    
    // Elemen DOM
    const expressionDiv = document.getElementById("expressionDisplay");
    const resultDiv = document.getElementById("resultDisplay");
    
    // Fungsi update tampilan (ekspresi & hasil)
    function updateDisplay() {
        // Tampilkan ekspresi, jika kosong tampilkan '0'
        if (currentExpression === "") {
            expressionDiv.innerText = "0";
        } else {
            expressionDiv.innerText = currentExpression;
        }
        
        // Hasil: evaluasi dan tampilkan hanya jika ekspresi valid, kalau tidak tampilkan pesan atau hasil sebelumnya
        // tapi lebih baik kita evaluasi realtime untuk preview hasil (tanpa mengganggu)
        if (currentExpression.trim() === "") {
            resultDiv.innerText = "0";
            return;
        }
        
        // Coba evaluasi ekspresi matematika (aman) untuk pratinjau hasil
        try {
            let evalResult = evaluateExpression(currentExpression);
            // Jika hasilnya valid number, format untuk menghilangkan floating point berlebihan
            if (typeof evalResult === 'number' && !isNaN(evalResult) && isFinite(evalResult)) {
                let formatted = formatResult(evalResult);
                resultDiv.innerText = formatted;
            } else {
                // Jika Infinity atau NaN, tampilkan "Error"
                resultDiv.innerText = "Error";
            }
        } catch (e) {
            resultDiv.innerText = "Error";
        }
    }
    
    // Evaluasi ekspresi dengan Function (lebih aman dari eval, tetap hati-hati)
    function evaluateExpression(expr) {
        // Bersihkan dari karakter yang tidak diinginkan, hanya angka, operator, titik, kurung opsional? kita tidak pakai kurung manual tapi bisa dari ekspresi
        // Dukung operator: + - * / % dan titik desimal. Hindari multiple operator berturut-turut tapi nanti di-santaiin.
        // Ganti simbol × dan ÷ agar sesuai javascript
        let prepared = expr.replace(/×/g, '*').replace(/÷/g, '/');
        // Pastikan tidak ada karakter berbahaya; hanya angka, operator, %, ., spasi
        // Cek pola aman: angka, operator aritmatika dasar, titik, spasi, tanda kurung sederhana (tidak wajib, tapi jika ada biarkan)
        // Namun untuk kalkulator sederhana kita filtering secara tidak membahayakan, tapi gunakan Function
        // Filter karakter ilegal: hanya boleh 0-9, + - * / % . ( ) dan spasi
        const allowedRegex = /^[0-9+\-*/%.()\s]+$/;
        if (!allowedRegex.test(prepared)) {
            throw new Error("Invalid expression");
        }
        // Hindari pembagian dengan nol akan menghasilkan Infinity, biarkan user tahu.
        // Gunakan Function constructor untuk evaluasi yang lebih aman dari eval (masih perlu sanitasi)
        // Kita tambahkan penanganan persen: misal 50% menjadi 0.5, tapi lebih kompleks; namun dalam kalkulator standar, persen memodifikasi angka sebelumnya.
        // TAPI karena kita mendukung % sebagai operator sisa bagi (modulus) dalam matematika? 
        // Dalam kalkulator ini saya akan mengartikan % sebagai modulo (sisa bagi) seperti pada programming: 10%3 = 1.
        // Tapi agar user friendly, kita pertahankan persen sebagai modulo. Sementara jika ingin persen dari suatu angka, user bisa hitung manual.
        // Tidak perlu overthinking, cukup validasi dan evaluasi.
        // Tapi hati-hati dengan % di js bekerja untuk modulus, kita biarkan sesuai ekspektasi umum kalkulator (sisa bagi)
        const evalFunc = new Function('return (' + prepared + ')');
        let result = evalFunc();
        // Jika hasil NaN atau infinite, lempar error
        if (isNaN(result) || !isFinite(result)) {
            throw new Error("Math Error");
        }
        return result;
    }
    
    // Format hasil agar tidak terlalu panjang dan menghilangkan trailing .0 jika perlu
    function formatResult(num) {
        // Batasi maksimal 10 digit desimal untuk tampilan cantik
        if (Number.isInteger(num)) {
            return num.toString();
        }
        // Jika angka desimal terlalu panjang, bulatkan sampai 8 digit
        let rounded = parseFloat(num.toFixed(8));
        // Hapus trailing zero
        let str = rounded.toString();
        if (str.includes('.')) {
            str = str.replace(/\.?0+$/, '');
        }
        return str;
    }
    
    // Menambahkan ke ekspresi (angka, operator, titik)
    function addToExpression(value) {
        // Aturan setelah evaluasi: jika baru saja menekan = dan kita tekan angka/operator, maka kita reset ekspresi
        if (justEvaluated) {
            // jika yang ditambahkan adalah operator, kita lanjutkan dari hasil sebelumnya
            // tapi agar lebih natural: misal hasil 8 lalu tekan + , maka ekspresi menjadi "8 + "
            if (isOperator(value) || value === '%') {
                // gunakan hasil terakhir yang tampil di result (sebagai angka awal)
                let lastRes = resultDiv.innerText;
                if (lastRes !== "Error" && !isNaN(parseFloat(lastRes))) {
                    currentExpression = lastRes + value;
                } else {
                    currentExpression = "0" + value;
                }
            } else {
                // angka atau titik, mulai ekspresi baru
                currentExpression = value;
            }
            justEvaluated = false;
        } else {
            // normal append
            // Cegah multiple leading zero tidak perlu? lebih baik biarkan logika sederhana
            // Tapi jika ekspresi kosong dan value '00', kita cukup "0"
            if (currentExpression === "" && (value === "00")) {
                currentExpression = "0";
            } 
            else if (currentExpression === "" && value === ".") {
                currentExpression = "0.";
            }
            else {
                currentExpression += value;
            }
        }
        // Bersihkan ekspresi dari operator ganda berlebihan (opsional, tapi biar rapi)
        // Misal: jika ada "+-" akan tetap, tapi bisa dievaluasi error, user dapat menghapus. Tidak masalah.
        updateDisplay();
    }
    
    // Cek apakah string merupakan operator (+, -, *, /, ×, ÷)
    function isOperator(str) {
        return ['+', '-', '*', '/', '×', '÷'].includes(str);
    }
    
    // Tombol clear (C)
    function clearAll() {
        currentExpression = "";
        justEvaluated = false;
        updateDisplay();
    }
    
    // Tombol delete (⌫) hapus karakter terakhir
    function deleteLast() {
        if (justEvaluated) {
            // setelah hasil evaluasi, jika tekan hapus, biasanya ingin menghapus ekspresi terakhir? kita reset
            currentExpression = "";
            justEvaluated = false;
        } else {
            // hapus 1 karakter dari kanan
            currentExpression = currentExpression.slice(0, -1);
        }
        updateDisplay();
    }
    
    // Tombol sama dengan (=)
    function evaluateCurrent() {
        if (currentExpression === "") {
            resultDiv.innerText = "0";
            return;
        }
        
        try {
            let rawResult = evaluateExpression(currentExpression);
            let niceResult = formatResult(rawResult);
            resultDiv.innerText = niceResult;
            // Simpan hasil ke ekspresi untuk melanjutkan perhitungan
            // Tapi biarkan ekspresi tetap tampil di baris atas, namun saat angka selanjutnya akan reset
            // Tapi agar pengalaman seperti kalkulator umum, setelah =, ekspresi dipertahankan tapi kita siapkan justEvaluated true
            // Dan hasil muncul di result. Saat tekan angka/operator nanti akan reset atau lanjut.
            // Jadi kita set justEvaluated = true agar input berikutnya mereset/menggunakan hasil.
            justEvaluated = true;
            // optional: kita bisa menampilkan ekspresi sebelumnya di bagian expression, tidak perlu diubah
            // Namun kita tidak ubah currentExpression biar tetap terlihat, tetapi jika user menekan angka, akan reset.
            // Kalau user ingin langsung edit, bisa tekan tombol angka atau operator. Itu sesuai justEvaluated.
            // Untuk kenyamanan, simpan hasil terakhir sebagai angka untuk operator lanjutan nanti.
            // Tetapi karena kita set justEvaluated true, maka di addToExpression akan menangani lanjutan operator dengan baik.
            // Juga update tampilan (tetap sama, tidak mengubah expression tapi hasil berubah)
            updateDisplay(); // memastikan display result sudah sesuai
        } catch (e) {
            resultDiv.innerText = "Error";
            justEvaluated = true; // supaya input selanjutnya mereset error state
            // reset ekspresi agar tidak error terus? biarkan user clear atau hapus
            // tetapi akan lebih baik menampilkan error sementara, tombol clear bisa reset.
        }
    }
    
    // Tombol persen : membuat persen dari angka terakhir? standar kalkulator: misal 50% = 0.5, atau 50+20% = 50+10 =60.
    // Untuk kesederhanaan, kita akan implementasi persen sebagai operasi modulo (sisa bagi) tapi agar sesuai "kalkulator imut", saya implementasikan 
    // persen untuk menghitung persen dari angka saat ini? Biar lebih intuitif? Banyak yang berharap % jadi persentase.
    // Saya buat agar ketika menekan % dia akan memodifikasi angka terakhir menjadi persen (nilai/100) 
    // Namun karena kita support ekspresi yang kompleks, lebih baik fungsionalitas sederhana: % mengubah angka yang baru diketik menjadi persen dari nilai sebelumnya?
    // Agak rumit, maka untuk kalkulator ini saya pilih modulo (sisa bagi) untuk menghindari bug, tapi saya tambahkan penjelasan di footer? 
    // Tapi karena judulnya spesial buat Nisa Imut, Saya akan buat % berfungsi sebagai persentase sederhana: 
    // misal ekspresi "50+20%" akan diolah menjadi 50+10? terlalu kompleks parsing. Jadi tetap gunakan modulo biar stabil, tapi biar tidak membingungkan, saya ubah.
    // Agar lebih sesuai ekspektasi kebanyakan pengguna awam, saya akan mengubah % menjadi persen (membagi 100) pada evaluasi saja? 
    // Tetapi karena kita tidak parsing grammar, lebih baik gunakan % sebagai modulus (sisa bagi) tapi saya ganti tombol persen dengan simbol % tapi fungsinya modulo.
    // atau kita tambahkan fitur jika user tekan % setelah angka, akan mengganti angka menjadi angka/100? terlalu intervensi.
    // Saya putuskan tetap jadi operator modulus (sisa bagi) karena lebih mudah dan stabil, dengan catatan jelas di panduan? tidak masalah.
    // Tapi saya akan buat tombol % menjadi persen ala kalkulator modern? tidak, saya terapkan sebagai persentase dari hasil evaluasi terakhir? rumit.
    // Biarkan % sebagai operator % (modulus) yang valid dalam matematika (sisa bagi). Itu tidak salah.
    
    // Namun supaya lebih imut dan menyenangkan, saya membuat % sebagai tombol "persen" dengan cara membagi angka yang ada di layar hasil dengan 100.
    // Coba buat method percentAction: mengubah ekspresi? Lebih simple, jika dalam keadaan tidak mengetik ekspresi panjang? tidak konsisten.
    // Solusi: tombol % akan menambahkan karakter '%' ke ekspresi dan bekerja sebagai modulus (sisa bagi) secara matematis, karena dalam javascript operator % adalah modulus.
    // user bisa pakai untuk hitung sisa bagi seperti 10%3=1. Tidak masalah. 
    // Tapi untuk keamanan, saya biarkan seperti itu.
    // Namun saya bisa menambahkan special handling: jika tekan % setelah angka dan ingin persen dari angka sebelumnya? susah.
    // Saya memutuskan tetap jadi operator modulo, karena cukup berguna. Tapi agar lebih lucu, tooltip tidak ada, biarlah.
    
    // t
