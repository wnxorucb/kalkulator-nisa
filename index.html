<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kalkulator Nisa Imut ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f9c9e8 0%, #f7a1c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, -apple-system, 'Comic Neue', cursive;
            margin: 0;
            padding: 20px;
        }

        .calculator-card {
            max-width: 380px;
            width: 100%;
            background: rgba(255, 245, 250, 0.95);
            border-radius: 70px 70px 80px 80px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 12px #ffe0f0, 0 0 0 16px #ffb7cf;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .calculator-card:hover {
            transform: scale(1.01);
        }

        .cute-header {
            background: #ffecf3;
            padding: 18px 20px 12px 20px;
            text-align: center;
            border-bottom: 3px dashed #ff90b5;
        }

        .cute-header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e84393, #fd79a8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px #ffe0f0;
            font-weight: 800;
        }

        .cute-header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #c4457a;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .heart-emoji {
            animation: beat 1.2s infinite ease;
            display: inline-block;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .display-screen {
            background: #2d1f2b;
            margin: 20px 25px 15px 25px;
            border-radius: 48px;
            padding: 18px 20px;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3), 0 3px 0 #ab8a9a;
        }

        .expression {
            background: #fff6f0;
            border-radius: 36px;
            padding: 12px 18px;
            text-align: right;
            font-size: 1.2rem;
            color: #7a4e64;
            font-weight: 500;
            min-height: 54px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
        }

        .result {
            background: #fbe7f0;
            border-radius: 36px;
            padding: 12px 20px;
            text-align: right;
            font-size: 2.5rem;
            font-weight: bold;
            color: #c2185b;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
        }

        .buttons-panel {
            padding: 10px 20px 30px 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background: #ffeef4;
            border: none;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 16px 0;
            border-radius: 60px;
            font-family: 'Poppins', 'Segoe UI', monospace;
            transition: all 0.15s ease;
            color: #b13e6b;
            cursor: pointer;
            box-shadow: 0 5px 0 #cfa5bd;
            text-shadow: 0 1px 0 white;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cfa5bd;
        }

        .operator-btn {
            background: #ffd9e8;
            color: #c2185b;
            font-size: 2rem;
            font-weight: 800;
        }

        .equal-btn {
            background: #f9a8d4;
            color: white;
            text-shadow: 0 1px 2px #a13e63;
            box-shadow: 0 5px 0 #b25f84;
            font-size: 2rem;
        }

        .clear-btn {
            background: #ffc0d0;
            color: #b13e6b;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .delete-btn {
            background: #ffd0de;
            font-size: 1.4rem;
        }

        .num-btn {
            background: white;
            color: #e84393;
            font-weight: 700;
        }

        .footer-note {
            text-align: center;
            padding: 10px 10px 18px;
            font-size: 0.7rem;
            color: #e06d9a;
            background: #fff2f7;
            border-top: 1px solid #ffcadd;
            font-weight: 500;
        }

        @media (max-width: 450px) {
            .buttons-panel {
                gap: 8px;
            }
            button {
                font-size: 1.4rem;
                padding: 12px 0;
            }
            .result {
                font-size: 2rem;
            }
            .expression {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="cute-header">
        <h1>🌸 Kalkulator Nisa Imut 🌸</h1>
        <p>💖 buat kamu yang tersayang 💖 <span class="heart-emoji">❤️</span></p>
    </div>

    <div class="display-screen">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
    </div>

    <div class="buttons-panel">
        <button class="clear-btn" data-action="clear">C</button>
        <button class="delete-btn" data-action="delete">⌫</button>
        <button class="operator-btn" data-op="%">%</button>
        <button class="operator-btn" data-op="/">÷</button>

        <button class="num-btn" data-num="7">7</button>
        <button class="num-btn" data-num="8">8</button>
        <button class="num-btn" data-num="9">9</button>
        <button class="operator-btn" data-op="*">×</button>

        <button class="num-btn" data-num="4">4</button>
        <button class="num-btn" data-num="5">5</button>
        <button class="num-btn" data-num="6">6</button>
        <button class="operator-btn" data-op="-">−</button>

        <button class="num-btn" data-num="1">1</button>
        <button class="num-btn" data-num="2">2</button>
        <button class="num-btn" data-num="3">3</button>
        <button class="operator-btn" data-op="+">+</button>

        <button class="num-btn" data-num="0">0</button>
        <button class="num-btn" data-num="00">00</button>
        <button class="num-btn" data-dot=".">.</button>
        <button class="equal-btn" data-action="equals">=</button>
    </div>
    <div class="footer-note">
        ✨ sayang nisa, hitungan jadi lebih manis ✨
    </div>
</div>

<script>
    let currentExpression = "";
    let justEvaluated = false;

    const expressionDiv = document.getElementById("expressionDisplay");
    const resultDiv = document.getElementById("resultDisplay");

    function updateDisplay() {
        if (currentExpression === "") {
            expressionDiv.innerText = "0";
        } else {
            expressionDiv.innerText = currentExpression;
        }
        
        if (currentExpression.trim() === "") {
            resultDiv.innerText = "0";
            return;
        }
        
        try {
            let evalResult = evaluateExpression(currentExpression);
            if (typeof evalResult === 'number' && !isNaN(evalResult) && isFinite(evalResult)) {
                let formatted = formatResult(evalResult);
                resultDiv.innerText = formatted;
            } else {
                resultDiv.innerText = "Error";
            }
        } catch (e) {
            resultDiv.innerText = "Error";
        }
    }
    
    function evaluateExpression(expr) {
        let prepared = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        const allowedRegex = /^[0-9+\-*/%.()\s]+$/;
        if (!allowedRegex.test(prepared)) {
            throw new Error("Invalid expression");
        }
        const evalFunc = new Function('return (' + prepared + ')');
        let result = evalFunc();
        if (isNaN(result) || !isFinite(result)) {
            throw new Error("Math Error");
        }
        return result;
    }
    
    function formatResult(num) {
        if (Number.isInteger(num)) {
            return num.toString();
        }
        let rounded = parseFloat(num.toFixed(8));
        let str = rounded.toString();
        if (str.includes('.')) {
            str = str.replace(/\.?0+$/, '');
        }
        return str;
    }
    
    function addToExpression(value) {
        if (justEvaluated) {
            if (isOperator(value) || value === '%') {
                let lastRes = resultDiv.innerText;
                if (lastRes !== "Error" && !isNaN(parseFloat(lastRes))) {
                    currentExpression = lastRes + value;
                } else {
                    currentExpression = "0" + value;
                }
            } else {
                currentExpression = value;
            }
            justEvaluated = false;
        } else {
            if (currentExpression === "" && value === "00") {
                currentExpression = "0";
            } 
            else if (currentExpression === "" && value === ".") {
                currentExpression = "0.";
            }
            else {
                currentExpression += value;
            }
        }
        updateDisplay();
    }
    
    function isOperator(str) {
        return ['+', '-', '*', '/', '×', '÷', '−'].includes(str);
    }
    
    function clearAll() {
        currentExpression = "";
        justEvaluated = false;
        updateDisplay();
    }
    
    function deleteLast() {
        if (justEvaluated) {
            currentExpression = "";
            justEvaluated = false;
        } else {
            currentExpression = currentExpression.slice(0, -1);
        }
        updateDisplay();
    }
    
    function evaluateCurrent() {
        if (currentExpression === "") {
            resultDiv.innerText = "0";
            return;
        }
        
        try {
            let rawResult = evaluateExpression(currentExpression);
            let niceResult = formatResult(rawResult);
            resultDiv.innerText = niceResult;
            justEvaluated = true;
            updateDisplay();
        } catch (e) {
            resultDiv.innerText = "Error";
            justEvaluated = true;
        }
    }
    
    function addDecimal() {
        if (justEvaluated) {
            currentExpression = "0.";
            justEvaluated = false;
            updateDisplay();
            return;
        }
        
        let parts = currentExpression.split(/[\+\-\*\/%×÷−]/);
        let lastPart = parts[parts.length-1];
        if (lastPart.includes('.')) {
            return;
        }
        if (currentExpression === "" || currentExpression.endsWith("(") || isOperator(currentExpression.slice(-1))) {
            currentExpression += "0.";
        } else {
            currentExpression += ".";
        }
        updateDisplay();
    }
    
    // Event binding yang sudah diperbaiki
    document.querySelectorAll('.num-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (btn.hasAttribute('data-num')) {
                let numVal = btn.getAttribute('data-num');
                addToExpression(numVal);
            } else if (btn.hasAttribute('data-dot')) {
                addDecimal();
            }
        });
    });
    
    document.querySelectorAll('.operator-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            let op = btn.getAttribute('data-op');
            if (!op) return;
            
            let displayOp = op;
            if (op === '/') displayOp = '÷';
            if (op === '*') displayOp = '×';
            if (op === '-') displayOp = '−';
            
            if (justEvaluated) {
                let lastRes = resultDiv.innerText;
                if (lastRes !== "Error" && !isNaN(parseFloat(lastRes))) {
                    currentExpression = lastRes + displayOp;
                } else {
                    currentExpression = "0" + displayOp;
                }
                justEvaluated = false;
            } else {
                if (currentExpression === "") {
                    currentExpression = "0" + displayOp;
                } else {
                    const lastChar = currentExpression.slice(-1);
                    if (['+', '-', '×', '÷', '%', '*', '/', '−'].includes(lastChar)) {
                        currentExpression = currentExpression.slice(0, -1) + displayOp;
                    } else {
                        currentExpression += displayOp;
                    }
                }
            }
            updateDisplay();
        });
    });
    
    document.querySelector('.clear-btn').addEventListener('click', () => {
        clearAll();
    });
    
    document.querySelector('.delete-btn').addEventListener('click', () => {
        deleteLast();
    });
    
    document.querySelector('.equal-btn').addEventListener('click', () => {
        evaluateCurrent();
    });
    
    // Inisialisasi
    clearAll();
</script>
</body>
</html>
